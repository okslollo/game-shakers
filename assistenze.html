<div class="contact-form">
    <h2 style="font-family: 'Bangers'; font-size: 2.5rem; margin-top: 0;" id="form-title">APRI UN TICKET</h2>
    
    <form action="https://formspree.io/f/gameshakersstudios@gmail.com" method="POST">
        <div class="form-group">
            <label id="label-name">Nome Completo</label>
            <input type="text" name="name" placeholder="Es. Lollo" required>
        </div>
        <div class="form-group">
            <label id="label-email">Email di Contatto</label>
            <input type="email" name="email" placeholder="nome@esempio.com" required>
        </div>
        <div class="form-group">
            <label id="label-issue">Tipo di Problema</label>
            <select name="issue">
                <option value="Tecnico">Problema Tecnico</option>
                <option value="Acquisti">Acquisti in-game</option>
                <option value="Segnalazione">Segnalazione Giocatore</option>
                <option value="Altro">Altro</option>
            </select>
        </div>
        <div class="form-group">
            <label id="label-msg">Messaggio</label>
            <textarea name="message" rows="5" placeholder="Descrivi il tuo problema in dettaglio..." required></textarea>
        </div>
        
        <input type="hidden" name="_subject" value="Nuovo Ticket di Assistenza - Game Shakers">
        
        <button type="submit" id="btn-submit">INVIA RICHIESTA</button>
    </form>
</div>
